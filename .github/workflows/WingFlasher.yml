name: Build WingFlasher

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        working-directory: desktop_app/wingfeather_app
        run: uv sync --group dev

      - name: Build with PyInstaller
        working-directory: desktop_app/wingfeather_app
        run: uv run pyinstaller WingFlasher.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wingflasher-${{ matrix.os }}
          path: desktop_app/wingfeather_app/dist/
